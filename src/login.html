<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMR-X | Login</title>
  <link rel="stylesheet" href="styles/login.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<header>
  <div class="topbar">
    <a href="index.html" class="site-title-link">
      <div class="logo-img"></div>
      <span class="site-title">AMR-X</span>
    </a>

    <nav class="landing-nav">
      <!-- page-specific links here -->
    </nav>

    <!-- empty; auth-ui.js will put the user icon here -->
    <div class="nav-right"></div>
  </div>
</header>



<main class="auth-wrapper">
  <div class="auth-glow"></div>

  <section class="auth-card">
    <h1 id="loginTitle">Login to AMR-X</h1>
    <p class="subtitle" id="loginSubtitle">
      Use your AMR-X credentials to access your portal.
    </p>

    <form class="auth-form" id="loginForm">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" required>

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" required>

      <div class="form-row">
        <label class="checkbox-wrap">
          <input type="checkbox" id="remember">
          <span>Remember me</span>
        </label>
        <a href="#" class="link-muted">Forgot password?</a>
      </div>

      <p class="form-error" id="loginError"></p>

      <button type="submit" class="primary-btn">Login</button>

      <p class="alt-link">
        Don’t have an account?
        <a id="signupLink" href="signup.html">Create one</a>
      </p>
    </form>
  </section>
</main>

<footer>
  <p>&copy; 2025 AMR-X</p>
</footer>

<script>
  // Read ?role=pharma / admin / clinician and adjust texts + signup link
  const params = new URLSearchParams(window.location.search);
  const role = params.get("role"); // pharma | admin | clinician | null

  const loginTitle = document.getElementById("loginTitle");
  const loginSubtitle = document.getElementById("loginSubtitle");
  const signupLink = document.getElementById("signupLink");

  if (role === "pharma") {
    loginTitle.textContent = "Login to Pharmacist Portal";
    loginSubtitle.textContent =
      "Sign in to see antibiotic usage, resistance trends and stewardship analytics.";
    signupLink.href = "signup.html?role=pharma";
  } else if (role === "admin") {
    loginTitle.textContent = "Login to Admin Portal";
    loginSubtitle.textContent =
      "Sign in to manage hospital-wide AMR-X settings, users and reports.";
    signupLink.href = "signup.html?role=admin";
  } else if (role === "clinician") {
    loginTitle.textContent = "Login to Clinician Portal";
    loginSubtitle.textContent =
      "Sign in to access clinician-focused AMR views and bedside support.";
    signupLink.href = "signup.html?role=clinician";
  } else {
    // generic login
    loginTitle.textContent = "Login to AMR-X";
    loginSubtitle.textContent =
      "Use your AMR-X credentials to access your portal.";
    signupLink.href = "signup.html";
  }
</script>
<script type="module" src="scripts/login.js"></script>
<script type="module" src="scripts/auth-ui.js"></script>
</body>
</html>
