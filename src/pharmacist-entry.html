<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pharmacist Entry | AMR-X</title>
  <link rel="stylesheet" href="styles/pharmacist-entry.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<header>
  <div class="topbar">
    <a href="index.html" class="site-title-link">
      <div class="logo-img"></div>
      <span class="site-title">AMR-X</span>
    </a>

    <nav class="landing-nav">
      <!-- page-specific links here -->
    </nav>

    <!-- empty; auth-ui.js will put the user icon here -->
    <div class="nav-right"></div>
  </div>
</header>



<main>
  <section class="form-section">
    <h2>Pharmacist Data Entry</h2>
    <p class="form-subtitle">
      Log antibiotics dispensed and treatment outcomes to keep AMR trends up to date.
    </p>

    <!-- Single form with the working id -->
    <form id="pharmacist-form" class="medicine-form">
      <div class="form-group">
        <label for="medicinesSold">Which medicines sold?</label>
        <!-- DROPDOWN instead of text input -->
        <select id="medicinesSold" name="medicinesSold" required>
          <option value="">Select antibiotic</option>
          <option value="Amoxicillin">Amoxicillin</option>
          <option value="Ciprofloxacin">Ciprofloxacin</option>
          <option value="Azithromycin">Azithromycin</option>
          <option value="Ceftriaxone">Ceftriaxone</option>
          <option value="Doxycycline">Doxycycline</option>
          <option value="Amikacin">Amikacin</option>
          <option value="Cefixime">Cefixime</option>
          <option value="Meropenem">Meropenem</option>
          <option value="Piperacillin-Tazobactam">Piperacillin-Tazobactam</option>
          <option value="Vancomycin">Vancomycin</option>
          <option value="Other">Other</option>
        </select>
        <!-- Optional free text when "Other" is chosen -->
        <input type="text" id="medicineOther" placeholder="Enter medicine" style="display:none; margin-top:8px;">
      </div>

      <div class="form-group">
        <label for="quantity">Quantity sold</label>
        <input
          type="number"
          id="quantity"
          name="quantity"
          required
          placeholder="Number of units/bottles"
          min="0"
          value="0"
        >
      </div>

      <div class="form-group">
        <label for="dosage">Dosage prescribed</label>
        <input
          type="text"
          id="dosage"
          name="dosage"
          required
          placeholder="E.g. 500mg twice daily"
        >
      </div>

      <div class="form-group">
        <label for="cured">Did patients get cured?</label>
        <select id="cured" name="cured" required>
          <option value="">Select status</option>
          <option value="Yes">Yes</option>
          <option value="No">No</option>
          <option value="Partial">Partially</option>
        </select>
      </div>

      <div class="form-group">
        <label for="feedback">Feedback or observations</label>
        <textarea
          id="feedback"
          name="feedback"
          rows="3"
          placeholder="Any side effects, patient responses, etc."
        ></textarea>
      </div>

      <button type="submit" class="card-btn">Submit Data</button>
    </form>

    <div id="successMsg" class="success-message"></div>
  </section>
</main>

<footer>
  <p>&copy; 2025 AMR-X</p>
</footer>

<script>
  // Show "Other" textbox when needed
  const medSel = document.getElementById('medicinesSold');
  const medOther = document.getElementById('medicineOther');
  medSel.addEventListener('change', () => {
    medOther.style.display = (medSel.value === 'Other') ? 'block' : 'none';
  });

  // Submit handler (logic unchanged)
  window.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('pharmacist-form');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const chosenMedicine = (medSel.value === 'Other' ? medOther.value.trim() : medSel.value);

      const payload = {
        medicinesSold: chosenMedicine,
        quantity: Number(document.getElementById('quantity').value || 0),
        dosage: document.getElementById('dosage').value,
        cured: document.getElementById('cured').value,
        feedback: document.getElementById('feedback').value
      };

      try {
        const res = await fetch('http://localhost:5000/api/pharmacist-entry', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.ok) {
          const successDiv = document.getElementById('successMsg');
          successDiv.textContent = 'Entry saved successfully.';
          successDiv.classList.add('visible');
          form.reset();
          medOther.style.display = 'none';
          setTimeout(() => successDiv.classList.remove('visible'), 2500);
        } else {
          alert('Error: ' + data.error);
        }
      } catch (err) {
        alert('Failed: ' + err.message);
      }
    });
  });
</script>
<script type="module" src="scripts/auth-ui.js"></script>
</body>
</html>
