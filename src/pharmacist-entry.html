<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pharmacist Entry | AMR-X</title>
  <link rel="stylesheet" href="styles/pharmacist-entry.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<header>
  <div class="navbar">
    <div class="nav-left">
      <a href="index.html" class="site-title-link">
        <div class="logo-img"></div>
        <span class="site-title">AMR-X</span>
      </a>
    </div>
    <div class="nav-right">
      <a href="pharma.html" class="nav-link">Dashboard</a>
      <a href="pharmacist-entry.html" class="nav-link active">Pharmacist Entry</a>
      <a href="upload-data.html" class="nav-link">Upload Data</a>
      <a href="index.html" class="nav-link">Home</a>
    </div>

    <!-- PROFILE PLACEHOLDER -->
    <div id="profilePlaceholder" aria-hidden="true" style="min-width:84px; display:flex; align-items:center; justify-content:flex-end;"></div>
  </div>
</header>


<main>
  <section class="form-section">
    <h2>Pharmacist Data Entry</h2>
    <p class="form-subtitle">
      Record culture results and prescriptions to keep AMR trends up to date.
    </p>

    <!-- Single form with the working id -->
    <form id="pharmacist-form" class="medicine-form">
      <div class="form-group">
        <label for="species">Bacterial species</label>
        <input
          type="text"
          id="species"
          name="species"
          required
          placeholder="E. coli, Klebsiella, Pseudomonas, etc."
        >
      </div>

      <div class="form-group">
        <label for="susceptibility">Antibiotic susceptibility results (optional)</label>
        <textarea
          id="susceptibility"
          name="susceptibility"
          rows="3"
          placeholder="E.g. Sensitive to: piperacillin-tazobactam; Resistant to: ceftriaxone, ciprofloxacin"
        ></textarea>
      </div>

      <div class="form-group">
        <label for="prescriptionDetails">Prescription details</label>
        <textarea
          id="prescriptionDetails"
          name="prescriptionDetails"
          rows="3"
          required
          placeholder="Drug name, dose, route, frequency, duration"
        ></textarea>
      </div>

      <div class="form-group">
        <label for="clinicalNotes">Clinical notes</label>
        <textarea
          id="clinicalNotes"
          name="clinicalNotes"
          rows="3"
          placeholder="Diagnosis, severity, comorbidities, other relevant notes"
        ></textarea>
      </div>

      <button type="submit" class="card-btn">Submit Data</button>
    </form>

    <div id="successMsg" class="success-message"></div>
  </section>
</main>

<footer>
  <p>&copy; 2025 AMR-X</p>
</footer>

<script type="module">
  import { db } from "./scripts/firebase-init.js";
  import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

  // Helper: prefer explicit ids we've seen in your project
  function findPharmForm() {
    // prefer exact ids in order
    const preferIds = ['pharmForm', 'pharmacist-form', 'pharmacist_form'];
    for (const id of preferIds) {
      const el = document.getElementById(id);
      if (el) return el;
    }
    // fallback to first <form> on page (keeps prior behavior)
    const forms = document.getElementsByTagName('form');
    if (forms.length) {
      console.warn("pharmForm not found; using first <form> on page as fallback. Consider adding id='pharmForm' or id='pharmacist-form' to be explicit.");
      return forms[0];
    }
    return null;
  }

  function setStatus(el, text='', cls='') {
    if (!el) return;
    el.textContent = text;
    el.className = cls ? `status ${cls}` : 'status';
  }

  // small heuristic: treat certain field names as numeric
  const numericHints = ['quantity','qty','count','num','amount'];

  function isNumericField(name, el) {
    if (!name) return false;
    if (el.type === 'number') return true;
    const lower = name.toLowerCase();
    return numericHints.some(h => lower.includes(h));
  }

  function collectFormData(formEl) {
    const payload = {};
    // pick explicit inputs, selects, textareas with name attribute
    const elements = Array.from(formEl.querySelectorAll('input[name], select[name], textarea[name]'));
    elements.forEach(el => {
      const name = el.name;
      if (!name) return;
      if (el.type === 'checkbox') { payload[name] = el.checked; return; }
      if (el.type === 'radio') { if (el.checked) payload[name] = el.value; return; }
      let val = el.value;
      if (isNumericField(name, el)) {
        if (val === '' || val == null) payload[name] = null;
        else {
          const n = Number(val);
          payload[name] = Number.isNaN(n) ? val : n;
        }
      } else payload[name] = (val === '' ? null : val);
    });
    return payload;
  }

  async function init() {
    if (document.readyState === 'loading') {
      await new Promise(resolve => document.addEventListener('DOMContentLoaded', resolve, {once:true}));
    }

    // optional status element you may add to HTML: <div id="status"></div>
    const statusEl = document.getElementById('status') || document.getElementById('successMsg');

    const form = findPharmForm();
    if (!form) {
      console.error("Form not found on page. Make sure there's a <form> element (id='pharmacist-form' is recommended).");
      if (statusEl) setStatus(statusEl, "Form not found.", "error");
      return;
    }

    // make sure the form doesn't have an old submit handler
    form.onsubmit = null;

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      if (statusEl) setStatus(statusEl, '', '');

      // HTML5 validation
      if (!form.checkValidity()) {
        if (statusEl) setStatus(statusEl, 'Please fill required fields', 'error');
        return;
      }

      const payload = collectFormData(form);
      payload.createdAt = serverTimestamp();

      // debug: show payload (non-sensitive) in console
      console.log('Saving pharmacist entry payload:', payload);

      try {
        // write to Firestore collection "pharmacist_entries"
        await addDoc(collection(db, "pharmacist_entries"), payload);
        if (statusEl) {
          setStatus(statusEl, 'Saved ✓', 'success');
          // also add visible class if using .success-message
          statusEl.classList && statusEl.classList.add('visible');
        }
        form.reset();
        // clear status after short delay
        setTimeout(() => {
          if (statusEl) {
            setStatus(statusEl, '', '');
            statusEl.classList && statusEl.classList.remove('visible');
          }
        }, 1800);
      } catch (err) {
        // helpful debugging output
        console.error('Error saving pharmacist entry:', err);
        // if this is a Firebase permission error, it usually contains "Missing or insufficient permissions"
        if (statusEl) setStatus(statusEl, 'Save failed — check console for details', 'error');
      }
    });
  }

  init();
</script>



<script type="module" src="scripts/auth-ui.js"></script>
</body>
</html>
