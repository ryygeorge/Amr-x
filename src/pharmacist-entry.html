<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pharmacist Entry | AMR-X</title>
  <link rel="stylesheet" href="styles/pharmacist-entry.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<header>
  <div class="navbar">
    <div class="nav-left">
      <a href="index.html" class="site-title-link">
        <div class="logo-img"></div>
        <span class="site-title">AMR-X</span>
      </a>
    </div>
    <div class="nav-right">
      <a href="pharma.html" class="nav-link">Dashboard</a>
      <a href="pharmacist-entry.html" class="nav-link active">Pharmacist Entry</a>
      <a href="upload-data.html" class="nav-link">Upload Data</a>
      <a href="index.html" class="nav-link">Home</a>
    </div>

    <!-- PROFILE PLACEHOLDER -->
    <div id="profilePlaceholder" aria-hidden="true" style="min-width:84px; display:flex; align-items:center; justify-content:flex-end;"></div>
  </div>
</header>


<main>
  <section class="form-section">
    <h2>Pharmacist Data Entry</h2>
    <p class="form-subtitle">
      Record culture results and prescriptions to keep AMR trends up to date.
    </p>

    <!-- Single form with the working id -->
    <form id="pharmacist-form" class="medicine-form">
      <div class="form-group">
        <label for="species">Bacterial species</label>
        <input
          type="text"
          id="species"
          name="species"
          required
          placeholder="E. coli, Klebsiella, Pseudomonas, etc."
        >
      </div>

      <div class="form-group">
        <label for="susceptibility">Antibiotic susceptibility results (optional)</label>
        <textarea
          id="susceptibility"
          name="susceptibility"
          rows="3"
          placeholder="E.g. Sensitive to: piperacillin-tazobactam; Resistant to: ceftriaxone, ciprofloxacin"
        ></textarea>
      </div>

      <div class="form-group">
        <label for="prescriptionDetails">Prescription details</label>
        <textarea
          id="prescriptionDetails"
          name="prescriptionDetails"
          rows="3"
          required
          placeholder="Drug name, dose, route, frequency, duration"
        ></textarea>
      </div>

      <div class="form-group">
        <label for="clinicalNotes">Clinical notes</label>
        <textarea
          id="clinicalNotes"
          name="clinicalNotes"
          rows="3"
          placeholder="Diagnosis, severity, comorbidities, other relevant notes"
        ></textarea>
      </div>

      <button type="submit" class="card-btn">Submit Data</button>
    </form>

    <div id="successMsg" class="success-message"></div>
  </section>
</main>

<footer>
  <p>&copy; 2025 AMR-X</p>
</footer>

<script>
  // Submit handler
  window.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('pharmacist-form');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const payload = {
        species: document.getElementById('species').value,
        susceptibility: document.getElementById('susceptibility').value,
        prescriptionDetails: document.getElementById('prescriptionDetails').value,
        clinicalNotes: document.getElementById('clinicalNotes').value
      };

      try {
        const res = await fetch('http://localhost:5000/api/pharmacist-entry', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (data.ok) {
          const successDiv = document.getElementById('successMsg');
          successDiv.textContent = 'Entry saved successfully.';
          successDiv.classList.add('visible');
          form.reset();
          setTimeout(() => successDiv.classList.remove('visible'), 2500);
        } else {
          alert('Error: ' + (data.error || 'Unknown error'));
        }
      } catch (err) {
        alert('Failed: ' + err.message);
      }
    });
  });
</script>
<script type="module" src="scripts/auth-ui.js"></script>
</body>
</html>
