<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pharmacist Entry | AMR-X</title>
  <link rel="stylesheet" href="styles/pharmacist-entry.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<header>
  <div class="navbar">
    <div class="nav-left">
      <a href="index.html" class="site-title-link">
        <div class="logo-img"></div>
        <span class="site-title">AMR-X</span>
      </a>
    </div>
    <div class="nav-right">
      <a href="pharma.html" class="nav-link">Dashboard</a>
      <a href="pharmacist-entry.html" class="nav-link active">Pharmacist Entry</a>
      <a href="upload-data.html" class="nav-link">Upload Data</a>
      <a href="index.html" class="nav-link">Home</a>
    </div>

    <!-- PROFILE PLACEHOLDER -->
    <div id="profilePlaceholder" aria-hidden="true" style="min-width:84px; display:flex; align-items:center; justify-content:flex-end;"></div>
  </div>
</header>


<main>
  <section class="form-section">
    <h2>Pharmacist Data Entry</h2>
    <p class="form-subtitle">
      Record culture results and prescriptions to keep AMR trends up to date.
    </p>

    <!-- Single form with the working id -->
    <form id="pharmacist-form" class="medicine-form">
      <div class="form-group">
        <label for="species">Bacterial species</label>
        <input
          type="text"
          id="species"
          name="species"
          required
          placeholder="E. coli, Klebsiella, Pseudomonas, etc."
        >
      </div>

      <div class="form-group">
        <label for="susceptibility">Antibiotic susceptibility results (optional)</label>
        <textarea
          id="susceptibility"
          name="susceptibility"
          rows="3"
          placeholder="E.g. Sensitive to: piperacillin-tazobactam; Resistant to: ceftriaxone, ciprofloxacin"
        ></textarea>
      </div>

      <div class="form-group">
        <label for="prescriptionDetails">Prescription details</label>
        <textarea
          id="prescriptionDetails"
          name="prescriptionDetails"
          rows="3"
          required
          placeholder="Drug name, dose, route, frequency, duration"
        ></textarea>
      </div>

      <div class="form-group">
        <label for="clinicalNotes">Clinical notes</label>
        <textarea
          id="clinicalNotes"
          name="clinicalNotes"
          rows="3"
          placeholder="Diagnosis, severity, comorbidities, other relevant notes"
        ></textarea>
      </div>

      <button type="submit" class="card-btn">Submit Data</button>
    </form>

    <div id="successMsg" class="success-message"></div>
  </section>
</main>

<footer>
  <p>&copy; 2025 AMR-X</p>
</footer>

<!-- Paste this at the bottom of pharmacist-entry.html, before </body> -->

<!-- Replace the entire <script type="module"> block with this: -->
<script type="module">
  import { supabase } from "./scripts/supabase-init.js";

  const form = document.getElementById('pharmacist-form');
  const successMsg = document.getElementById('successMsg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    // Get form values
    const species = document.getElementById('species').value.trim();
    const susceptibility = document.getElementById('susceptibility').value.trim();
    const prescriptionDetails = document.getElementById('prescriptionDetails').value.trim();
    const clinicalNotes = document.getElementById('clinicalNotes').value.trim();
    
    // Get current user
    const { data: { user }, error: userError } = await supabase.auth.getUser();
    
    if (userError || !user) {
      showMessage('Please login first!', 'error');
      return;
    }
    
    // Disable submit button
    const submitBtn = form.querySelector('button[type="submit"]');
    const originalText = submitBtn.textContent;
    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting...';
    
    try {
      // Insert into Supabase
      const { data, error } = await supabase
        .from('pharmacist_entries')
        .insert([
          {
            user_id: user.id,
            species: species,
            bacterialSpecies: species,
            susceptibility: susceptibility,
            antibioticResults: susceptibility,
            prescriptionDetails: prescriptionDetails,
            prescription: prescriptionDetails,
            clinicalNotes: clinicalNotes,
            notes: clinicalNotes
          }
        ]);
      
      if (error) throw error;
      
      showMessage('✅ Entry submitted successfully! Redirecting to dashboard...', 'success');
      form.reset();
      
      // Redirect to dashboard after 1.5 seconds
      setTimeout(() => {
        window.location.href = 'pharma.html';
      }, 1500);
      
    } catch (error) {
      console.error('Submission error:', error);
      showMessage(`❌ Error: ${error.message}`, 'error');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = originalText;
    }
  });

  function showMessage(text, type) {
    if (!successMsg) return;
    
    successMsg.textContent = text;
    successMsg.className = 'success-message';
    successMsg.classList.add(type);
    successMsg.style.display = 'block';
    
    // Auto-hide error messages after 5 seconds
    if (type === 'error') {
      setTimeout(() => {
        successMsg.style.display = 'none';
      }, 5000);
    }
  }

  // Also add CSS for message types
  const style = document.createElement('style');
  style.textContent = `
    .success-message.success {
      background-color: #10b981;
      color: white;
      padding: 12px;
      border-radius: 8px;
      margin-top: 16px;
    }
    .success-message.error {
      background-color: #ef4444;
      color: white;
      padding: 12px;
      border-radius: 8px;
      margin-top: 16px;
    }
  `;
  document.head.appendChild(style);
</script>



<script type="module" src="scripts/auth-ui.js"></script>
</body>
</html>
