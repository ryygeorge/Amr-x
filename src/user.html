<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Portal | AMR-X</title>
  <link rel="stylesheet" href="styles/user.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body data-hide-profile="true">
<header>
  <div class="topbar">
    <a href="index.html" class="site-title-link">
      <div class="logo-img"></div>
      <span class="site-title">AMR-X</span>
    </a>

    <nav class="landing-nav">
      <!-- page-specific links here -->
    </nav>

    <!-- empty; auth-ui.js will put the user icon here -->
    <div class="nav-right"></div>
  </div>
</header>



<main>
  <section class="user-section">
    <h2>AMR User Feedback</h2>
    <p class="user-subtitle">
      Share how antibiotics worked for you to help hospitals understand real-world outcomes.
    </p>

    <form class="user-form" id="userForm">
      <div class="form-group">
        <label for="userName">Your Name</label>
        <input type="text" id="userName" name="userName" required placeholder="Enter your name">
      </div>

      <div class="form-group">
        <label for="medicine">Medicine Used</label>
        <!-- Dropdown instead of text input -->
        <select id="medicine" name="medicine" required>
          <option value="">Select antibiotic</option>
          <option value="Amoxicillin">Amoxicillin</option>
          <option value="Ciprofloxacin">Ciprofloxacin</option>
          <option value="Azithromycin">Azithromycin</option>
          <option value="Ceftriaxone">Ceftriaxone</option>
          <option value="Doxycycline">Doxycycline</option>
          <option value="Amikacin">Amikacin</option>
          <option value="Cefixime">Cefixime</option>
          <option value="Meropenem">Meropenem</option>
          <option value="Piperacillin-Tazobactam">Piperacillin-Tazobactam</option>
          <option value="Vancomycin">Vancomycin</option>
          <option value="Other">Other</option>
        </select>
        <!-- Shown only if "Other" is selected -->
        <input type="text" id="medicineOther" placeholder="Enter medicine" style="display:none; margin-top:8px;">
      </div>

      <div class="form-group">
        <label for="effect">Effectiveness</label>
        <select id="effect" name="effect" required>
          <option value="">Select</option>
          <option value="cured">Cured</option>
          <option value="partial">Partial Relief</option>
          <option value="no">No Effect</option>
        </select>
      </div>

      <div class="form-group">
        <label for="sideEffects">Side Effects</label>
        <input type="text" id="sideEffects" name="sideEffects" placeholder="Any side effects?">
      </div>

      <div class="form-group">
        <label for="comments">Comments/Feedback</label>
        <textarea id="comments" name="comments" rows="3" placeholder="Write your experience (optional)"></textarea>
      </div>

      <button type="submit" class="card-btn">Submit</button>
    </form>

    <div id="userSuccess" class="success-message"></div>
  </section>
</main>

<footer>
  <p>&copy; 2025 AMR-X</p>
</footer>

<script>
  // Toggle "Other" input for medicine
  const medSelect = document.getElementById('medicine');
  const medOther  = document.getElementById('medicineOther');

  medSelect.addEventListener('change', () => {
    medOther.style.display = (medSelect.value === 'Other') ? 'block' : 'none';
  });

  // Submit behavior (same logic, just cleaner success UI)
  document.getElementById('userForm').onsubmit = function(e) {
    e.preventDefault();

    const medicineResolved = (medSelect.value === 'Other'
      ? (medOther.value || '').trim()
      : medSelect.value
    );

    // later you can send this to backend:
    // const payload = {
    //   userName: document.getElementById('userName').value,
    //   medicine: medicineResolved,
    //   effect: document.getElementById('effect').value,
    //   sideEffects: document.getElementById('sideEffects').value,
    //   comments: document.getElementById('comments').value
    // };

    const msg = document.getElementById('userSuccess');
    msg.textContent = "Thank you for your feedback!";
    msg.classList.add('visible');

    this.reset();
    medOther.style.display = 'none';

    setTimeout(() => msg.classList.remove('visible'), 2500);
  };
</script>
</body>
</html>
