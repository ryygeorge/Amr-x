<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Portal | AMR-X</title>
  <link rel="stylesheet" href="styles/user.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- leaflet css -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>

  <!-- Make sure you put this AFTER Leaflet's CSS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>

  <!-- Leaflet Heat Plugin -->
      <script
        src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js">
      </script>

    <style>
      #map { height: 350px; }
    </style>

</head>
<body data-hide-profile="true">
<header>
  <div class="navbar">
    <div class="nav-left">
      <a href="index.html" class="site-title-link">
        <div class="logo-img"></div>
        <span class="site-title">AMR-X</span>
      </a>
    </div>
    <div class="nav-right">
      <a href="user.html" class="nav-link active">User Portal</a>
      <a href="index.html" class="nav-link">Home</a>
    </div>
  </div>
</header>

<main>
  <section class="user-section">
    <h2>AMR User Feedback</h2>
    <p class="user-subtitle">
      Share details about your infections and antibiotic use to help hospitals understand real-world outcomes.
    </p>

    <form class="user-form" id="userForm" autocomplete="off">
      <div class="form-group">
        <label for="age">Age</label>
        <input
          type="number"
          id="age"
          name="age"
          min="0"
          max="120"
          required
          placeholder="Enter your age"
        >
      </div>

      <div class="form-group">
        <label for="gender">Gender</label>
        <select id="gender" name="gender" required>
          <option value="">Select gender</option>
          <option value="female">Female</option>
          <option value="male">Male</option>
        </select>
      </div>

      <div class="form-group">
        <label for="infectionFrequency">Infection frequency</label>
        <select id="infectionFrequency" name="infectionFrequency" required>
          <option value="">Select</option>
          <option value="rarely">Rarely (0–1 per month)</option>
          <option value="sometimes">Sometimes (2–3 per month)</option>
          <option value="often">Often (&gt;3 per month)</option>
        </select>
      </div>

      <div class="form-group">
        <label for="symptoms">Symptoms</label>
        <textarea
          id="symptoms"
          name="symptoms"
          rows="3"
          required
          placeholder="Describe your main symptoms"
        ></textarea>
      </div>

      <div class="form-group">
        <label for="pastAntibioticUse">Past antibiotic use</label>
        <textarea
          id="pastAntibioticUse"
          name="pastAntibioticUse"
          rows="3"
          placeholder="Which antibiotics have you used before and when?"
        ></textarea>
      </div>

      <div class="form-group">
        <label for="hospitalVisits">Hospital visits</label>
        <textarea
          id="hospitalVisits"
          name="hospitalVisits"
          rows="3"
          placeholder="Any recent hospital or clinic visits? (reason and date)"
        ></textarea>
      </div>

      <div class="form-group">
        <label for="riskFactors">Any risk factors</label>
        <textarea
          id="riskFactors"
          name="riskFactors"
          rows="3"
          placeholder="E.g., diabetes, recent surgery, long-term catheter, etc."
        ></textarea>
      </div>

      <button type="submit" class="card-btn">Submit</button>
    </form>

    <div id="userSuccess" class="success-message"></div>
    <div id="userError" class="error-message" style="color:#f87171; margin-top:8px;"></div>
  </section>

  <section>
    <h2 style="text-align: center;">Heat Map</h2>
    <div id="map"></div>
  </section>
</main>

<footer>
  <p>&copy; 2025 AMR-X</p>
</footer>

<!-- Firebase SDK (modular) - loaded as module -->
<script type="module">
  // Import the functions you need from the Firebase SDKs
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

  // TODO: Replace with your project's actual Firebase config
  const firebaseConfig = {
    apiKey: "REPLACE_WITH_YOUR_API_KEY",
    authDomain: "REPLACE_WITH_AUTH_DOMAIN",
    projectId: "REPLACE_WITH_PROJECT_ID",
    storageBucket: "REPLACE_WITH_STORAGE_BUCKET",
    messagingSenderId: "REPLACE_WITH_SENDER_ID",
    appId: "REPLACE_WITH_APP_ID"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const feedbackCol = collection(db, "user_feedback");

  // Form handling
  const form = document.getElementById('userForm');
  const msg = document.getElementById('userSuccess');
  const err = document.getElementById('userError');

  form.onsubmit = async function (e) {
    e.preventDefault();
    err.textContent = "";

    // Gather values
    const payload = {
      age: Number(document.getElementById('age').value || null),
      gender: document.getElementById('gender').value || null,
      infectionFrequency: document.getElementById('infectionFrequency').value || null,
      symptoms: document.getElementById('symptoms').value.trim() || null,
      pastAntibioticUse: document.getElementById('pastAntibioticUse').value.trim() || null,
      hospitalVisits: document.getElementById('hospitalVisits').value.trim() || null,
      riskFactors: document.getElementById('riskFactors').value.trim() || null,
      createdAt: serverTimestamp()
    };

    try {
      // Save to Firestore
      await addDoc(feedbackCol, payload);

      // UI feedback
      msg.textContent = "Thank you for your feedback!";
      msg.classList.add('visible');
      form.reset();

      // Clear message after 2.5s
      setTimeout(() => msg.classList.remove('visible'), 2500);
    } catch (error) {
      console.error("Error saving feedback:", error);
      err.textContent = "Could not submit feedback. Please try again later.";
    }
  };

   // Initialize Leaflet map
  var map = L.map('map');
  map .setView([51.505, -0.09], 13);

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
}).addTo(map);

/* ===============================
   HEAT MAP – BACTERIAL RESISTANCE
   Kerala (Randomized hotspots)
================================ */

// [latitude, longitude, intensity]
// intensity: 0.2 (low resistance) → 1.0 (high resistance)

const bacterialResistanceHeat = [

  // Kochi (High resistance)
  [9.9312, 76.2673, 0.9],
  [9.9355, 76.2608, 0.85],
  [9.9251, 76.2799, 0.8],

  // Kottayam (Medium–High)
  [9.5916, 76.5222, 0.7],
  [9.5988, 76.5351, 0.65],

  // Trivandrum (Medium)
  [8.5241, 76.9366, 0.6],
  [8.5302, 76.9423, 0.55],

  // Thrissur (Medium–Low)
  [10.5276, 76.2144, 0.5],
  [10.5333, 76.2208, 0.45],

  // Kozhikode
  [11.2588, 75.7804, 0.6],
  [11.2662, 75.7841, 0.55],

  // Alappuzha
  [9.4981, 76.3388, 0.5],

  // Palakkad
  [10.7867, 76.6548, 0.45]

  // // Kanjirappally
  // [9.5671, 76.7184, 0.4]
];

/* ===============================
   ADD HEATMAP TO EXISTING MAP
================================ */

L.heatLayer(bacterialResistanceHeat, {
  radius: 35,
  blur: 25,
  maxZoom: 12,
  gradient: {
    0.2: 'blue',     // low resistance
    0.4: 'cyan',
    0.6: 'yellow',   // moderate
    0.8: 'orange',
    1.0: 'red'       // high resistance
  }
}).addTo(map);


navigator.geolocation.watchPosition(success, error);

let marker, circle, zoomed;


function success(pos){

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const accuracy = pos.coords.accuracy;

    if(marker){
        map.removeLayer(marker);
        map.removeLayer(circle);
    }
   marker =  L.marker([lat, lng]).addTo(map);
   circle =  L.circle([lat, lng],{ radius: accuracy}).addTo(map);


   if(!zoomed){
      zoomed = map.fitBounds(circle.getBounds());
   }

   map.setView([lat, lng]);
    
}

function error(err){
    
    if(err.code == 1) {
      alert("Please allow geoloaction access");
    }else{
      alert("Cannot get your current location");
    }
}
</script>

</body>
</html>
