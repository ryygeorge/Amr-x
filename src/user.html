<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Portal | AMR-X</title>
  <link rel="stylesheet" href="styles/user.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body data-hide-profile="true">
<header>
  <div class="navbar">
    <div class="nav-left">
      <a href="index.html" class="site-title-link">
        <div class="logo-img"></div>
        <span class="site-title">AMR-X</span>
      </a>
    </div>
    <div class="nav-right">
      <a href="user.html" class="nav-link active">User Portal</a>
      <a href="index.html" class="nav-link">Home</a>
    </div>
  </div>
</header>

<main>
  <section class="user-section">
    <h2>AMR User Feedback</h2>
    <p class="user-subtitle">
      Share details about your infections and antibiotic use to help hospitals understand real-world outcomes.
    </p>

    <form class="user-form" id="userForm">
      <div class="form-group">
        <label for="age">Age</label>
        <input
          type="number"
          id="age"
          name="age"
          min="0"
          max="120"
          required
          placeholder="Enter your age"
        >
      </div>

      <div class="form-group">
        <label for="gender">Gender</label>
        <select id="gender" name="gender" required>
          <option value="">Select gender</option>
          <option value="female">Female</option>
          <option value="male">Male</option>
          <option value="other">Other</option>
          <option value="prefer_not_say">Prefer not to say</option>
        </select>
      </div>

      <div class="form-group">
        <label for="infectionFrequency">Infection frequency</label>
        <select id="infectionFrequency" name="infectionFrequency" required>
          <option value="">Select</option>
          <option value="rarely">Rarely (0–1 per year)</option>
          <option value="sometimes">Sometimes (2–3 per year)</option>
          <option value="often">Often (&gt;3 per year)</option>
        </select>
      </div>

      <div class="form-group">
        <label for="symptoms">Symptoms</label>
        <textarea
          id="symptoms"
          name="symptoms"
          rows="3"
          required
          placeholder="Describe your main symptoms"
        ></textarea>
      </div>

      <div class="form-group">
        <label for="pastAntibioticUse">Past antibiotic use</label>
        <textarea
          id="pastAntibioticUse"
          name="pastAntibioticUse"
          rows="3"
          placeholder="Which antibiotics have you used before and when?"
        ></textarea>
      </div>

      <div class="form-group">
        <label for="hospitalVisits">Hospital visits</label>
        <textarea
          id="hospitalVisits"
          name="hospitalVisits"
          rows="3"
          placeholder="Any recent hospital or clinic visits? (reason and date)"
        ></textarea>
      </div>

      <div class="form-group">
        <label for="riskFactors">Any risk factors</label>
        <textarea
          id="riskFactors"
          name="riskFactors"
          rows="3"
          placeholder="E.g., diabetes, recent surgery, long-term catheter, etc."
        ></textarea>
      </div>

      <button type="submit" class="card-btn">Submit</button>
    </form>

    <div id="userSuccess" class="success-message"></div>
  </section>
</main>

<footer>
  <p>&copy; 2025 AMR-X</p>
</footer>

<script>
  // Submit behavior
  document.getElementById('userForm').onsubmit = function (e) {
    e.preventDefault();

    // Later you can send this to backend:
    // const payload = {
    //   age: document.getElementById('age').value,
    //   gender: document.getElementById('gender').value,
    //   infectionFrequency: document.getElementById('infectionFrequency').value,
    //   symptoms: document.getElementById('symptoms').value,
    //   pastAntibioticUse: document.getElementById('pastAntibioticUse').value,
    //   hospitalVisits: document.getElementById('hospitalVisits').value,
    //   riskFactors: document.getElementById('riskFactors').value
    // };

    const msg = document.getElementById('userSuccess');
    msg.textContent = "Thank you for your feedback!";
    msg.classList.add('visible');

    this.reset();

    setTimeout(() => msg.classList.remove('visible'), 2500);
  };
</script>
</body>
</html>
