<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Data | AMR-X</title>
  <link rel="stylesheet" href="styles/upload-data.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<header>
  <div class="navbar">
    <div class="nav-left">
      <a href="index.html" class="site-title-link">
        <div class="logo-img"></div>
        <span class="site-title">AMR-X</span>
      </a>
    </div>
    <div class="nav-right">
      <a href="pharma.html" class="nav-link">Dashboard</a>
      <a href="pharmacist-entry.html" class="nav-link">Pharmacist Entry</a>
      <a href="upload-data.html" class="nav-link active">Upload Data</a>
      <a href="index.html" class="nav-link">Home</a>
    </div>
  </div>
</header>

<main>
  <section class="upload-section">
    <h2>Upload Data Files</h2>
    <p class="upload-subtitle">
      Bulk upload AMR, antibiogram or pharmacy usage files in one place.
    </p>

    <div class="upload-container">
      <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">📁</div>
        <h3>Drop files here or click to browse</h3>
        <p>Supported formats: CSV, Excel (.xlsx)</p>
        <!-- ⬇ only CSV + Excel -->
        <input type="file" id="fileInput" multiple accept=".csv,.xlsx" hidden>
        <button type="button" class="browse-btn">Choose Files</button>
      </div>

      <div class="file-list" id="fileList"></div>

      <button type="button" class="card-btn" id="uploadBtn" style="display:none;">
        Upload Files
      </button>
    </div>
  </section>
</main>

<footer>
  <p>&copy; 2025 AMR-X</p>
</footer>

<!-- Upload logic + Firestore storage -->
<script type="module">
  import { db, auth } from "./scripts/firebase-init.js";
  import {
    collection,
    addDoc,
    serverTimestamp,
  } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
  import * as XLSX from "https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm";

  const fileInput  = document.getElementById("fileInput");
  const fileList   = document.getElementById("fileList");
  const uploadBtn  = document.getElementById("uploadBtn");
  const uploadArea = document.getElementById("uploadArea");
  const browseBtn  = document.querySelector(".browse-btn");

  // Trigger file dialog
  browseBtn?.addEventListener("click", (e) => {
    e.stopPropagation();
    fileInput.click();
  });

  // (extra safety, though you already have inline onclick)
  uploadArea?.addEventListener("dragover", (e) => {
    e.preventDefault();
  });

  uploadArea?.addEventListener("drop", (e) => {
    e.preventDefault();
    if (!e.dataTransfer?.files?.length) return;
    fileInput.files = e.dataTransfer.files;
    displayFiles(fileInput.files);
  });

  fileInput.onchange = () => displayFiles(fileInput.files);

  function displayFiles(files) {
    fileList.innerHTML = "";
    for (let f of files) {
      const p = document.createElement("p");
      p.textContent = `📄 ${f.name} (${(f.size / 1024).toFixed(1)} KB)`;
      fileList.appendChild(p);
    }
    uploadBtn.style.display = files.length ? "inline-flex" : "none";
  }

  // --- Helpers to read & parse files ---

  function readFileAsText(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => resolve(e.target?.result || "");
      reader.onerror = reject;
      reader.readAsText(file);
    });
  }

  // Very simple CSV parser (no fancy quoted commas support)
  function parseCsv(text) {
    const lines = text.split(/\r?\n/).filter((l) => l.trim() !== "");
    if (!lines.length) return [];

    const headers = lines[0].split(",").map((h) => h.trim());
    const rows = [];

    for (let i = 1; i < lines.length; i++) {
      const parts = lines[i].split(",");
      const obj = {};
      headers.forEach((h, idx) => {
        obj[h || `col_${idx}`] = (parts[idx] ?? "").trim();
      });
      rows.push(obj);
    }

    return rows;
  }

  async function parseXlsx(file) {
    const data = await file.arrayBuffer();
    const workbook = XLSX.read(data, { type: "array" });
    const sheetName = workbook.SheetNames[0];
    const sheet = workbook.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });
    return rows;
  }

  // Store parsed rows in Firestore:
  // mlUploads collection -> one doc per file
  // each file doc -> subcollection "rows" containing each data row
  async function storeFileDataInFirestore(file, rows) {
    const uploadsCol = collection(db, "mlUploads");

    const uploadDocRef = await addDoc(uploadsCol, {
      fileName: file.name,
      fileSize: file.size,
      mimeType: file.type || null,
      rowCount: rows.length,
      uploadedAt: serverTimestamp(),
      uploaderUid: auth.currentUser ? auth.currentUser.uid : null,
    });

    const rowsCol = collection(uploadDocRef, "rows");

    // Simple approach: one addDoc per row (okay for smaller files)
    for (const row of rows) {
      await addDoc(rowsCol, row);
    }

    return {
      id: uploadDocRef.id,
      rowCount: rows.length,
    };
  }

  uploadBtn.onclick = async () => {
    const files = fileInput.files;
    if (!files.length) return;

    // Validate file types
    for (let f of files) {
      const name = f.name.toLowerCase();
      if (!name.endsWith(".csv") && !name.endsWith(".xlsx")) {
        alert("Only CSV and Excel (.xlsx) files are allowed.");
        return;
      }
    }

    uploadBtn.disabled = true;
    uploadBtn.textContent = "Uploading...";

    const storedFiles = [];

    try {
      for (let file of files) {
        const lower = file.name.toLowerCase();
        let rows = [];

        if (lower.endsWith(".csv")) {
          const text = await readFileAsText(file);
          rows = parseCsv(text);
        } else if (lower.endsWith(".xlsx")) {
          rows = await parseXlsx(file);
        }

        if (!rows.length) {
          console.warn(`No rows parsed from ${file.name}`);
          continue;
        }

        const info = await storeFileDataInFirestore(file, rows);
        storedFiles.push({ name: file.name, rows: info.rowCount });
      }

      if (!storedFiles.length) {
        alert("No valid data found to store.");
      } else {
        const summary = storedFiles
          .map((f) => `${f.name} (${f.rows} rows)`)
          .join("\n");
        alert("Uploaded & stored in database:\n" + summary);
      }

      fileList.innerHTML = "";
      uploadBtn.style.display = "none";
      fileInput.value = "";
    } catch (err) {
      console.error(err);
      alert("Upload failed: " + err.message);
    } finally {
      uploadBtn.disabled = false;
      uploadBtn.textContent = "Upload Files";
    }
  };
</script>

<!-- existing auth/profile UI -->
<script type="module" src="scripts/auth-ui.js"></script>
</body>
</html>
