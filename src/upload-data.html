<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Data | AMR-X</title>
  <link rel="stylesheet" href="styles/upload-data.css">
  <link rel="stylesheet" href="styles/chatbot.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<header>
  <div class="navbar">
    <div class="nav-left">
      <a href="index.html" class="site-title-link">
        <div class="logo-img"></div>
        <span class="site-title">AMR-X</span>
      </a>
    </div>
    <div class="nav-right">
      <a href="pharma.html" class="nav-link">Dashboard</a>
      <a href="pharmacist-entry.html" class="nav-link">Pharmacist Entry</a>
      <a href="upload-data.html" class="nav-link active">Upload Data</a>
      <a href="index.html" class="nav-link">Home</a>
    </div>

    <!-- PROFILE PLACEHOLDER -->
    <div id="profilePlaceholder" aria-hidden="true" style="min-width:84px; display:flex; align-items:center; justify-content:flex-end;"></div>
  </div>
</header>


<main>
  <section class="upload-section">
    <h2>Upload Data Files</h2>
    <p class="upload-subtitle">
      Upload AMR, antibiogram, or pharmacy usage files. Large CSV/Excel files are supported.
    </p>

    <div class="upload-container">
      <div class="upload-area" id="uploadArea">
        <div class="upload-icon">📁</div>
        <h3>Drop files here or click to browse</h3>
        <p>Supported formats: CSV, Excel (.xlsx)</p>
        <input type="file" id="fileInput" multiple accept=".csv,.xlsx" hidden>
        <button type="button" class="browse-btn">Choose Files</button>
      </div>

      <div class="file-list" id="fileList"></div>

      <button type="button" class="card-btn" id="uploadBtn" style="display:none;">
        Upload Files
      </button>
    </div>
  </section>
</main>

<footer>
  <p>&copy; 2025 AMR-X</p>
</footer>

<!-- In upload-data.html, add this BEFORE upload-data.js -->
<script type="module" src="scripts/supabase-init.js"></script>
<script type="module" src="scripts/upload-data.js"></script>
<!-- Existing auth/profile UI -->
<script type="module" src="scripts/auth-ui.js"></script>
<!-- Add this right before closing -->
<script>
  // Debug script to check if supabase loads
  document.addEventListener('DOMContentLoaded', function() {
    console.log('Page loaded, checking Supabase...');
    
    // Check every second if supabase loads
    const checkSupabase = setInterval(() => {
      if (window.supabase) {
        console.log('✅ Supabase is now available:', window.supabase);
        clearInterval(checkSupabase);
        
        // Test storage connection
        window.supabase.storage.from('uploads').list().then(result => {
          console.log('Storage bucket check:', result.error ? 'Error' : 'OK');
        });
      } else {
        console.log('⏳ Waiting for Supabase to load...');
      }
    }, 1000);
    
    // Stop checking after 10 seconds
    setTimeout(() => clearInterval(checkSupabase), 10000);
  });
</script>
<script type="module" src="scripts/chatbot-ui.js"></script>
</body>
</html>
