name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Install dependencies
      run: npm ci
    - name: Generate screenshots (optional)
      run: npm run generate:screenshots || true
    - name: Run tests
      run: |
        if [ -f package.json ]; then
          npm test || echo "No tests configured"
        else
          echo "No package.json"
        fi
